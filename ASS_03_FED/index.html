<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Spooky Halloween</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">

        <!-- Header -->
        <div id="header">
            <h1 id="headerText"></h1>
        </div>

        <input type="text" id="userInput" placeholder="Type something spooky...">

        <button onclick="alert('Spooky inline script!')">Click Me 👻</button>

        <!-- Buttons -->
        <div id="left-menu">
            <button id="forwardButton">🎃Move Forward</button>
            <button id="backButton">👣Step Back</button>
        </div>

        <div id="footer">
            <p id="statusMessage"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
